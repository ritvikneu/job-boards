      "description": "\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNiantic’s mission is to use emerging technology to enrich our experiences as human beings in the physical world. We build products that inspire movement, exploration, and face-to-face social interaction.\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eNiantic is seeking a Software Engineer - Server to build the server infrastructure that supports projects such as Pokémon GO, Pikmin Bloom and Ingress. You will work on real-time indexing, querying and aggregation problems at massive scales of hundreds of millions of events per day. These technical challenges pertain to a single, coherent world-wide instance shared by millions of users.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\"font-weight: 400;\"\u003eWe seek engineers with strong technical background, great execution, and self-starter mentality. The ideal candidate loves to jump into the unknown, clarify ambiguities, quickly learn from failures, and break down vague ideas into concrete tasks.\u0026nbsp;\u003c/span\u003e\u003c/p\u003e\n\u003ch3\u003eResponsibilities\u003c/h3\u003e\n\u003cul\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eBuild and design reliable, high-throughput, low latency and scalable server and networking systems that support Niantic’s developers and products.\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eBuild key components of the platform that developers can incorporate to create rich experiences in their games.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003ePerform load testing, participate in code reviews, write unit tests, and conduct troubleshooting to ensure uptime for live systems.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eCollaborate with other specialists, product managers, and other departments to ensure code meets internal standards.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eCollaborate with cross-functional team members and stakeholders, including regular and reliable attendance and participation in meetings.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eRequired in-office 2 days on Wednesday and Thursday.\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eQualifications\u003c/h3\u003e\n\u003cul\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eBS, MS, or PhD in Computer Science, or a related technical field.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eMinimum of 2+ years of experience building reliable scalable platforms.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eProficiency in one of the following languages: Java, Go or C++ with working knowledge of Python, SQL.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience building networked and distributed systems.\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience building concurrent and multi-threaded services.\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eDelivered solutions to production environments, and provided tools to monitor, support and mitigate any issues.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eAbility to work in a fast-paced hybrid environment and handle stress appropriately and/or ability to solve practical problems and be sufficiently adaptable to handle dynamic situations with little advance notice.\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience working on cross-functional teams with ability to communicate effectively through written and verbal communications, including synchronous interactions with others.\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003ePlus If…\u003c/h3\u003e\n\u003cul\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience with deployment on hosting providers, such as Google Cloud, Azure or AWS.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience with building ETL pipelines or\u0026nbsp; crafting data-related ingestion APIs.\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eFamiliarity with one or more open source projects, such as Redis, Prometheus, Grafana, ElasticSearch and Envoy.\u0026nbsp;\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eFamiliarity\u003c/span\u003e\u003cspan style=\"font-weight: 400;\"\u003e with Kubernetes, infrastructure as code (such as Terraform).\u003c/span\u003e\u003c/li\u003e\n\u003cli style=\"font-weight: 400;\"\u003e\u003cspan style=\"font-weight: 400;\"\u003eExperience mentoring junior engineers or leading projects.\u003c/span\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cspan data-sheets-value=\"{\u0026quot;1\u0026quot;:2,\u0026quot;2\u0026quot;:\u0026quot;The total compensation package for this position includes a new hire offer base salary range of $142,000 - $220,500 + bonus + equity + benefits.\\n\\nIndividual u003e\u003cstrong\u003eJoin the Niantic team!\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eNiantic's global-scale augmented reality platform and digital map powers spatial computing experiences in the real world. Incubated out of the Maps team at Google, Niantic first created Ingress and then Pokémon GO, a cultural phenomenon and hit game played by tens of millions of people each month. Niantic’s Lightship platform, which powers Pokémon GO, also supports the company's other games including Pikmin Bloom, Peridot and Monster Hunter Now. Developers use Niantic’s platform to build their own AR applications and experiences, either with the Lightship Platform or directly through the web with 8th Wall.\u003c/p\u003e\n\u003cp\u003eWe believe that cultivating a workplace where our people are supported and included is essential to creating great products our community will love. Our mission emphasizes seeking and hiring diverse voices, including those who are traditionally underrepresented in the technology industry, and we consider this to be one of the most important values we hold close.\u003c/p\u003e\n\u003cp\u003eNiantic is a hybrid first company. We believe that in person interaction and collaboration fosters creativity, a sense of community, and is critical to our future success as a company. Our hybrid work schedules allow for a mix of remote and in-office work.\u003c/p\u003e\n\u003cp\u003eWe're a hard-working, fun, and exciting group who value intellectual curiosity and a passion for problem-solving! We have growing offices located in San Francisco, Sunnyvale, Palo Alto, Bellevue, Kansas, London, Tokyo, Hamburg, Hyderabad, and Zurich. #LI-HYBRID\u003c/p\u003e"
