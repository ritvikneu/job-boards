name: Health Check

'on':
  push:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20.6
        uses: actions/setup-node@v3
        with:
          node-version: 20.6
          cache: 'npm'
          
      - name: Install ALL dependencies
        run: npm install

      - name: Run tests
        run: npm test 
