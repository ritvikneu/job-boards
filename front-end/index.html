<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .job-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ccc;
        }
        th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        td:first-child {
            width: 30%;
        }
        .job-title {
            font-weight: bold;
        }
        .job-location {
            color: #666;
        }
        .job-posted {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="job-container">
        <table>
            <thead>
                <tr>
                    <th>Company Name</th>
                    <th>Job ID</th>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Posting Date</th>
                </tr>
            </thead>
            <tbody id="jobContainer">
                <!-- Jobs will be dynamically added here -->
            </tbody>
        </table>
    </div>

    <script>
        // Sample data array (replace with actual data)
        const jobs = [
            { company: "Company A", jobId: "001", title: "Frontend Developer", location: "New York", datePosted: "2024-06-08" },
            { company: "Company B", jobId: "002", title: "Backend Developer", location: "San Francisco", datePosted: "2024-06-07" },
            { company: "Company C", jobId: "003", title: "UI/UX Designer", location: "London", datePosted: "2024-06-06" }
            // Add more job objects as needed
        ];

        // Function to render jobs
        function renderJobs() {
            const jobContainer = document.getElementById('jobContainer');
            jobContainer.innerHTML = '';

            jobs.forEach(job => {
                const jobRow = document.createElement('tr');
                jobRow.innerHTML = `
                    <td>${job.company}</td>
                    <td>${job.jobId}</td>
                    <td class="job-title">${job.title}</td>
                    <td class="job-location">${job.location}</td>
                    <td class="job-posted">${job.datePosted}</td>
                `;
                jobRow.addEventListener('click', () => {
                    // Navigate to job link here (you can add this functionality)
                    console.log(`Navigate to job link for ${job.title}`);
                });
                jobContainer.appendChild(jobRow);
            });
        }

        // Initial rendering
        renderJobs();
    </script>
</body>
</html>
