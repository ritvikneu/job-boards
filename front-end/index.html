<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Board</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">Job Board</div>
    <div class="topbar-stats">
      <span><span id="stat-new" class="highlight">—</span> new</span>
      <span><span id="stat-total" class="highlight">—</span> total</span>
    </div>
    <div class="spacer"></div>
    <div id="last-scraped" class="topbar-date"></div>
  </div>

  <div class="toolbar">
    <input id="search" class="search-box" type="search" placeholder="Search title or company...">

    <div class="divider"></div>

    <div class="pill-group">
      <button class="pill active" data-status-filter="all">All</button>
      <button class="pill pill-new" data-status-filter="new">New</button>
      <button class="pill pill-interested" data-status-filter="interested">Interested</button>
      <button class="pill pill-applied" data-status-filter="applied">Applied</button>
      <button class="pill pill-saved" data-status-filter="saved">Saved</button>
      <button class="pill pill-rejected" data-status-filter="rejected">Rejected</button>
    </div>

    <select id="sort" class="sort-select">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="company">Company A–Z</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Status</th>
          <th>Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Posted</th>
        </tr>
      </thead>
      <tbody id="job-rows">
        <tr><td colspan="5" class="loading">Loading jobs...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="/app.js"></script>
</body>
</html>
